<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Read the Scripture emblem">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2C1E0A"/>
      <stop offset="60%" stop-color="#181008"/>
      <stop offset="100%" stop-color="#0E0A04"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8CC76"/>
      <stop offset="45%" stop-color="#C09030"/>
      <stop offset="100%" stop-color="#8A6018"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8CC76"/>
      <stop offset="100%" stop-color="#A9791F"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF7F2"/>
      <stop offset="100%" stop-color="#E2D9C8"/>
    </linearGradient>
  </defs>

  <!-- plate -->
  <rect x="8" y="8" width="496" height="496" rx="96" fill="url(#bg)"/>
  <rect x="22" y="22" width="468" height="468" rx="84" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.55"/>

  <!-- open book -->
  <g transform="translate(256 300)">
    <!-- pages -->
    <path d="M0 -64 C -54 -92 -118 -82 -150 -64 L -150 78 C -118 60 -54 50 0 78 Z" fill="url(#page)" stroke="#8A6018" stroke-width="2.5"/>
    <path d="M0 -64 C 54 -92 118 -82 150 -64 L 150 78 C 118 60 54 50 0 78 Z" fill="url(#page)" stroke="#8A6018" stroke-width="2.5"/>
    <!-- spine -->
    <path d="M0 -64 L 0 78" stroke="#8A6018" stroke-width="3.5" fill="none"/>
    <!-- text lines -->
    <g stroke="#C09030" stroke-width="3.4" stroke-linecap="round" opacity="0.65">
      <line x1="-128" y1="-46" x2="-26" y2="-58"/>
      <line x1="-128" y1="-22" x2="-26" y2="-34"/>
      <line x1="-128" y1="2"  x2="-26" y2="-10"/>
      <line x1="-128" y1="26" x2="-26" y2="14"/>
      <line x1="26" y1="-58" x2="128" y2="-46"/>
      <line x1="26" y1="-34" x2="128" y2="-22"/>
      <line x1="26" y1="-10" x2="128" y2="2"/>
      <line x1="26" y1="14"  x2="128" y2="26"/>
    </g>
  </g>

  <!-- quill -->
  <g transform="translate(300 150) rotate(28)">
    <path d="M0 0 C 40 -110 80 -150 96 -184 C 70 -150 44 -118 16 -28 Z"
          fill="url(#goldSoft)" stroke="#8A6018" stroke-width="2"/>
    <path d="M40 -78 L 70 -116 M28 -44 L 58 -82 M52 -112 L 80 -150"
          stroke="#8A6018" stroke-width="2" opacity="0.55" fill="none"/>
    <path d="M0 0 L 16 -28" stroke="#8A6018" stroke-width="3" fill="none"/>
  </g>

  <!-- monogram -->
  <text x="256" y="436" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="56" letter-spacing="10" fill="url(#gold)">RTS</text>
</svg>
