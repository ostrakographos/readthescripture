# Deploys the site to GitHub Pages. The served webroot is the contents of
# published/ with images/ alongside it — the same layout the site has always
# had on its webroot. Runs on pushes that touch site files; can also be run
# manually from the Actions tab.
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'published/**'
      - 'images/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble webroot (published/ + images/)
        run: |
          mkdir _site
          cp -r published/. _site/
          cp -r images _site/images

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
